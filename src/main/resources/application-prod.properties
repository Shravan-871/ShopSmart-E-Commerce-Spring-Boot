# ── Datasource (PostgreSQL) ──────────────────────────────
# Set these as environment variables before running in production
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/shopsmart}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:shopsmart}
spring.datasource.password=${DB_PASSWORD:shopsmart}

# ── JPA ──────────────────────────────────────────────────
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ───────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
