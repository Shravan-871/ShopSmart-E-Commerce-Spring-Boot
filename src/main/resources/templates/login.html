<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ShopSmart — Login</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #6c63ff 0%, #574fd6 100%);
        }
        .auth-card {
            background: white;
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .auth-logo { text-align: center; font-size: 2rem; margin-bottom: 0.25rem; }
        .auth-title { text-align: center; font-size: 1.4rem; font-weight: 700; margin-bottom: 0.25rem; color: #2d3436; }
        .auth-sub { text-align: center; font-size: 0.85rem; color: #636e72; margin-bottom: 1.75rem; }
        .auth-card .form-group { margin-bottom: 1rem; }
        .auth-card .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: #636e72; margin-bottom: 0.3rem; }
        .auth-card .form-group input {
            width: 100%; padding: 0.65rem 0.9rem;
            border: 1px solid #dfe6e9; border-radius: 8px;
            font-size: 0.9rem; outline: none; transition: border-color 0.2s;
        }
        .auth-card .form-group input:focus { border-color: #6c63ff; }
        .auth-submit {
            width: 100%; padding: 0.75rem;
            background: #6c63ff; color: white;
            border: none; border-radius: 8px;
            font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: background 0.2s;
            margin-top: 0.5rem;
        }
        .auth-submit:hover { background: #574fd6; }
        .auth-alert {
            padding: 0.65rem 1rem; border-radius: 8px;
            font-size: 0.85rem; margin-bottom: 1rem;
        }
        .auth-alert.error  { background: rgba(231,76,60,0.1);  color: #c0392b; border-left: 3px solid #e74c3c; }
        .auth-alert.success{ background: rgba(46,204,113,0.1); color: #27ae60; border-left: 3px solid #2ecc71; }
        .auth-footer { text-align: center; margin-top: 1.25rem; font-size: 0.85rem; color: #636e72; }
        .auth-footer a { color: #6c63ff; text-decoration: none; font-weight: 600; }
        .remember-row { display: flex; align-items: center; gap: 0.5rem; margin: 0.75rem 0; font-size: 0.85rem; color: #636e72; }
        .divider { text-align: center; color: #b2bec3; font-size: 0.8rem; margin: 0.5rem 0; }
        .role-hint {
            background: #f8f9fa; border-radius: 8px;
            padding: 0.75rem 1rem; font-size: 0.78rem;
            color: #636e72; margin-bottom: 1rem;
            border: 1px solid #dfe6e9;
        }
        .role-hint strong { color: #2d3436; }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">🛒</div>
        <div class="auth-title">ShopSmart</div>
        <div class="auth-sub">Sign in to your account</div>

        <div th:if="${error}"  class="auth-alert error"  th:text="${error}"></div>
        <div th:if="${logout}" class="auth-alert success" th:text="${logout}"></div>
        <div th:if="${param.registered}" class="auth-alert success">Account created! Please sign in.</div>

        <div class="role-hint">
            <strong>Admin:</strong> admin / admin123 &nbsp;|&nbsp;
            <strong>User:</strong> user / user123
        </div>

        <form method="post" action="/login">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required autofocus/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required/>
            </div>
            <div class="remember-row">
                <input type="checkbox" name="remember-me" id="rememberMe"/>
                <label for="rememberMe">Remember me for 24 hours</label>
            </div>
            <button type="submit" class="auth-submit">Sign In</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="/register">Create one</a>
        </div>
    </div>
</div>
</body>
</html>
